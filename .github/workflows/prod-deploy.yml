name: Deploy to InfinityFree

on:
  push:
    branches:
      - prod

permissions:
  contents: read

concurrency:
  group: infinityfree-production
  cancel-in-progress: false

jobs:
  ci:
    name: Run Laravel CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.3 for tests
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, curl, fileinfo, gd, intl, mbstring, pdo_sqlite, redis, sqlite3, xml, zip
          coverage: none
          tools: composer:v2

      - name: Install test dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run automated tests
        run: php artisan test

  deploy:
    name: Build and upload Laravel by FTP
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: '21'
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_PATH: mybackend.free.nf/htdocs/
      INFINITYFREE_ENV_FILE: ${{ secrets.INFINITYFREE_ENV_FILE }}

    steps:
      - name: Checkout tested prod commit
        uses: actions/checkout@v4

      - name: Set up PHP 8.3 for production
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, curl, fileinfo, gd, intl, mbstring, mysqli, redis, xml, zip
          coverage: none
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Prepare Laravel package for InfinityFree
        shell: bash
        run: |
          set -euo pipefail

          : "${INFINITYFREE_ENV_FILE:?Missing INFINITYFREE_ENV_FILE GitHub secret}"

          rm -rf deploy-build
          mkdir -p deploy-build

          rsync -a ./ deploy-build/ \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='deploy/' \
            --exclude='deploy-build/' \
            --exclude='node_modules/' \
            --exclude='public/' \
            --exclude='storage/logs/*.log' \
            --exclude='tests/'

          cp -a public/. deploy-build/
          cp deploy/infinityfree/index.php deploy-build/index.php
          cp deploy/infinityfree/.htaccess deploy-build/.htaccess

          mkdir -p deploy-build/bootstrap/cache
          mkdir -p deploy-build/storage/app/public
          mkdir -p deploy-build/storage/framework/cache/data
          mkdir -p deploy-build/storage/framework/sessions
          mkdir -p deploy-build/storage/framework/views
          mkdir -p deploy-build/storage/logs

          printf '%s' "${INFINITYFREE_ENV_FILE}" > deploy-build/.env

      - name: Upload only to mybackend production htdocs
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: ./deploy-build/
          server-dir: ${{ env.FTP_REMOTE_PATH }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
